<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab AHMADIAN, Ph.D. | Online CV</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #fdfdfd; }
        * { box-sizing: border-box; }
        body { font-family: "Times New Roman", "Hiragino Mincho ProN", serif; margin: 0; background: var(--bg); color: #222; line-height: 1.5; }
        .toolbar { background: var(--primary); padding: 12px; position: sticky; top: 0; display: flex; justify-content: center; gap: 15px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; font-size: 13px; text-transform: uppercase; }
        .btn.active { background: var(--accent); border-color: var(--accent); }
        .cv-paper { max-width: 850px; margin: 30px auto; background: white; padding: 60px 80px; box-shadow: 0 0 30px rgba(0,0,0,0.05); min-height: 100vh; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .header-text h1 { margin: 0; font-size: 28px; color: var(--primary); }
        .header-text .katakana { display: block; font-size: 16px; margin-top: 5px; color: #444; }
        .photo { width: 130px; height: 170px; border: 1px solid #ccc; overflow: hidden; }
        .photo img { width: 100%; height: auto; }
        h2 { border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; margin-top: 35px; font-size: 17px; padding-bottom: 3px; letter-spacing: 1px; }
        .entry { display: grid; grid-template-columns: 150px 1fr; margin-bottom: 15px; }
        .entry-date { font-size: 13px; color: #666; font-family: Arial, sans-serif; }
        .entry-title { font-weight: bold; font-size: 15px; }
        footer { margin-top: 50px; text-align: center; font-size: 11px; color: #bbb; border-top: 1px solid #eee; padding-top: 20px; }
        @media print { .toolbar { display: none; } .cv-paper { box-shadow: none; padding: 0; margin: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" id="btn-en" onclick="switchLang('en')">English</button>
    <button class="btn" id="btn-jp" onclick="switchLang('jp')">日本語</button>
</div>

<div class="cv-paper" id="cv-content">
    <p style="text-align:center; padding:50px;">Syncing with Researchmap Data...</p>
</div>

<script>
    let globalData = null;

    async function init() {
        try {
            // Path to your uploaded JSONL file on GitHub
            const response = await fetch('rm_researchers20260327.jsonl');
            const text = await response.text();
            
            // Researchmap JSONL contains one researcher object per line
            // We parse the first line as it contains your primary data
            globalData = JSON.parse(text.split('\n')[0]);
            switchLang('en');
        } catch (e) {
            console.error(e);
            document.getElementById('cv-content').innerHTML = "<p style='color:red; text-align:center;'>Error loading Researchmap file. Ensure 'rm_researchers20260327.jsonl' is in your GitHub folder.</p>";
        }
    }

    function switchLang(lang) {
        if (!globalData) return;
        
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');

        const labels = (lang === 'en') ? 
            ["Education", "Work Experience", "Research Projects", "Published Papers", "Books", "Presentations", "Awards", "Memberships", "Languages", "Technical"] :
            ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献", "所属学協会", "言語能力", "スキル・IT"];

        const name = lang === 'en' ? "Sohrab AHMADIAN, Ph.D." : "Sohrab AHMADIAN, Ph.D.";
        const katakana = lang === 'jp' ? "アフマディヤーン ソホラブ" : "";

        let html = `
            <div style="text-align: right; font-size: 11px; color: #999; margin-bottom: 10px;">ONLINE CV | DATA SYNCED FROM RESEARCHMAP</div>
            <header>
                <div class="header-text">
                    <h1>${name}</h1>
                    ${katakana ? `<span class="katakana">${katakana}</span>` : ''}
                    <p><strong>JSPS Postdoctoral Research Fellow</strong></p>
                    <p>${lang === 'en' ? 'Tokyo University of Foreign Studies' : '東京外国語大学'}</p>
                    <p style="font-size:14px; margin-top:10px; color:#555;">Email: ako.sohrab@gmail.com | ahmadian@tufs.ac.jp</p>
                </div>
                <div class="photo"><img src="https://researchmap.jp/sohrab.ahmadian/avatar.jpg"></div>
            </header>
        `;

        // --- Parser Sections ---
        // Researchmap JSON uses specific keys: education, research_experience, published_papers, etc.
        const sections = [
            { key: 'education', label: labels[0] },
            { key: 'research_experience', label: labels[1] },
            { key: 'research_projects', label: labels[2] },
            { key: 'published_papers', label: labels[3] },
            { key: 'books_etc', label: labels[4] },
            { key: 'presentations', label: labels[5] },
            { key: 'awards', label: labels[6] }
        ];

        sections.forEach(sec => {
            const items = globalData[sec.key];
            if (items && items.length > 0) {
                html += `<h2>${sec.label}</h2>`;
                items.forEach(item => {
                    const title = lang === 'en' ? (item.title?.en || item.title?.ja) : (item.title?.ja || item.title?.en);
                    const date = item.publication_date || item.from_date || "N/A";
                    const desc = lang === 'en' ? (item.journal?.en || item.journal?.ja || "") : (item.journal?.ja || item.journal?.en || "");
                    
                    html += `
                        <div class="entry">
                            <div class="entry-date">${date}</div>
                            <div>
                                <span class="entry-title">${title}</span>
                                <span style="font-size:14px; color:#444;">${desc}</span>
                            </div>
                        </div>`;
                });
            }
        });

        // Memberships & Skills (Custom handling if needed)
        if (globalData.association_memberships) {
            html += `<h2>${labels[7]}</h2><ul style="font-size:14px; line-height:1.8;">`;
            globalData.association_memberships.forEach(m => {
                const mName = lang === 'en' ? (m.association_name?.en || m.association_name?.ja) : (m.association_name?.ja || m.association_name?.en);
                html += `<li>${mName}</li>`;
            });
            html += `</ul>`;
        }

        html += `<footer>Academic Curriculum Vitae | Sync Date: 2026</footer>`;
        document.getElementById('cv-content').innerHTML = html;
    }

    init();
</script>
</body>
</html>
