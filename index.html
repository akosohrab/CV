<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Academic CV of Sohrab Ahmadian, Ph.D. - JSPS Postdoctoral Fellow">
    <title>Sohrab AHMADIAN, Ph.D. | Academic CV</title>
    
    <script src="data-en.js"></script>
    <script src="data-jp.js"></script>

    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #fdfdfd; }
        body { font-family: "Times New Roman", "Hiragino Mincho ProN", serif; margin: 0; background: var(--bg); }
        
        /* Language Switcher Toolbar */
        .lang-toolbar {
            background: var(--primary);
            padding: 10px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .cv-container { max-width: 850px; margin: 20px auto; background: white; padding: 50px 70px; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .profile-photo { width: 130px; height: 170px; border: 1px solid #000; }
        h2 { border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; margin-top: 30px; font-size: 18px; }
        .entry { display: grid; grid-template-columns: 140px 1fr; margin-bottom: 15px; }
        .entry-date { font-size: 13px; color: #666; }
        .entry-title { font-weight: bold; display: block; }
        
        @media print { .lang-toolbar { display: none; } .cv-container { box-shadow: none; padding: 0; } }
        @media (max-width: 600px) { .cv-container { padding: 20px; } .entry { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="lang-toolbar">
    <button class="lang-btn active" id="btn-en" onclick="switchLang('en')">ENGLISH</button>
    <button class="lang-btn" id="btn-jp" onclick="switchLang('jp')">日本語</button>
    <button class="lang-btn" style="background:#27ae60" onclick="window.print()">Print PDF</button>
</div>

<div class="cv-container" id="cv-content">
    </div>

<script>
    function switchLang(lang) {
        // تغییر وضعیت دکمه‌ها
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        
        const data = (lang === 'en') ? cvDataEn : cvDataJp; // فرض بر اینکه متغیرها در فایل‌های دیتا متفاوت نام‌گذاری شده‌اند
        const content = document.getElementById('cv-content');
        
        // ساختار هدر (Header)
        let html = `
            <header>
                <div>
                    <h1 style="margin:0; color:var(--primary)">${data.name}</h1>
                    <p><strong>${data.title}</strong></p>
                    <p>${data.affiliation}</p>
                    <p style="font-size:14px">Email: ${data.email} | Address: ${data.address}</p>
                </div>
                <div class="profile-photo"><img src="${data.photo}" style="width:100%"></div>
            </header>
        `;

        // بخش‌های اصلی
        const sectionNames = lang === 'en' 
            ? ["Education", "Appointments", "Grants", "Publications", "Books", "Presentations", "Awards"]
            : ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献"];
        
        const ids = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];

        ids.forEach((id, index) => {
            html += `<h2>${sectionNames[index]}</h2>`;
            data[id].forEach(item => {
                html += `
                    <div class="entry">
                        <div class="entry-date">${item.date}</div>
                        <div>
                            <span class="entry-title">${item.title}</span>
                            <span style="font-size:14px; color:#333">${item.desc}</span>
                        </div>
                    </div>
                `;
            });
        });

        content.innerHTML = html;
    }

    // لود اولیه (انگلیسی یا ژاپنی به انتخاب شما)
    window.onload = () => switchLang('jp');
</script>
</body>
</html>
