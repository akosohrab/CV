<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab AHMADIAN, Ph.D. | Academic CV</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #fdfdfd; }
        * { box-sizing: border-box; }
        body { font-family: "Times New Roman", "Hiragino Mincho ProN", serif; margin: 0; background: var(--bg); color: #222; line-height: 1.5; }
        .toolbar { background: var(--primary); padding: 12px; position: sticky; top: 0; display: flex; justify-content: center; gap: 15px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn.active { background: var(--accent); border-color: var(--accent); }
        .cv-paper { max-width: 850px; margin: 30px auto; background: white; padding: 60px 80px; box-shadow: 0 0 30px rgba(0,0,0,0.05); min-height: 100vh; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .header-text h1 { margin: 0; font-size: 28px; color: var(--primary); }
        .katakana-name { display: block; font-size: 16px; margin-top: 5px; color: #666; font-weight: normal; }
        .photo { width: 130px; height: 170px; border: 1px solid #ccc; overflow: hidden; background: #eee; }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        h2 { border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; margin-top: 35px; font-size: 16px; padding-bottom: 3px; letter-spacing: 1px; }
        .entry { display: grid; grid-template-columns: 150px 1fr; margin-bottom: 15px; }
        .entry-date { font-size: 13px; color: #666; font-family: Arial, sans-serif; }
        .entry-title { font-weight: bold; font-size: 15px; }
        .lang-badge { font-size: 10px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 3px; margin-left: 8px; vertical-align: middle; font-weight: normal; }
        .entry-desc { font-size: 14px; color: #333; display: block; margin-top: 2px; white-space: pre-wrap; }
        .skills-grid { display: grid; grid-template-columns: 120px 1fr; gap: 10px; font-size: 14px; margin-top: 20px; }
        @media print { .toolbar { display: none; } .cv-paper { box-shadow: none; padding: 0; margin: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" id="btn-en" onclick="switchLang('en')">English</button>
    <button class="btn" id="btn-jp" onclick="switchLang('jp')">日本語</button>
    <button class="btn" style="background:#fff; color:#1a2a3a; border:none;" onclick="window.print()">Print PDF</button>
</div>

<div class="cv-paper" id="cv-content"></div>

<script>

// --- DATA DASHBOARD ---

const cvDataEn = {
    "profile": {
        "name": "Sohrab AHMADIAN, Ph.D.",
        "katakana": "",
        "title": "JSPS Postdoctoral Research Fellow",
        "uni": "Tokyo University of Foreign Studies (TUFS)",
        "email": "ahmadian@tufs.ac.jp",
        "address": "3-11-1 Asahi-cho, Fuchu-shi, Tokyo 183-8534, Japan",
        "languages": "English (Advanced), Japanese (Business), Persian (Native), Kurdish (Native), Tajiki (Native), Arabic (Intermediate), Azari Turkish (Basic)",
        "technical": "Qualitative Research, Data Analysis / SPSS, R, MS Office / Adobe Photoshop, Corel Video Studio / WordPress",
        "web": "https://researchmap.jp/sohrab.ahmadian",
        "photo": ""
    },
    "sec-edu": [
        { "date": "2018.04 - 2024.03", "title": "Ph.D. International and Advanced Japan Studies", "desc": "University of Tsukuba. Dissertation: 'Zainichi Kurudo-jin no Diaspora Taiken ni kansuru Shitsuteki Kenkyu'" },
        { "date": "2013.09 - 2015.09", "title": "M.A. Japan Studies", "desc": "University of Tehran. Project: 'Abe Seiken ni okeru Heiwa-shugi no Shinro'" }
    ],
    "sec-work": [
        { "date": "2025.04 - Present", "title": "JSPS Postdoctoral Research Fellow", "desc": "Tokyo University of Foreign Studies (TUFS)" },
        { "date": "2026.03", "title": "Visiting Research Fellow", "desc": "University of Birmingham (IRIS)" },
        { "date": "2024.05 - 2025.03", "title": "Project Researcher", "desc": "Chiba University" }
    ],
    "sec-projects": [
        { "date": "2025.04 - 2027.03", "title": "Dynamics of Coexistence", "desc": "JSPS (No. 25KF0029). https://kaken.nii.ac.jp/grant/KAKENHI-PROJECT-25KF0029" }
    ],
    "sec-papers": [
        { "date": "2024.06.04", "title": "Kurdish Diaspora in Japan", "desc": "Palgrave Macmillan. DOI: 10.1007/978-981-97-2867-1_10", "lang": "English" }
    ],
    "sec-books": [],
    "sec-talks": [
        { "date": "2026.02.06", "title": "The 'Zero Plan' and Migration Governance", "desc": "ILCAA, TUFS.", "lang": "English" }
    ],
    "sec-misc": [
        { "date": "2025.04", "title": "JSPS Postdoctoral Research Fellow (PD)", "desc": "Japan Society for the Promotion of Science" }
    ]
};

const cvDataJp = {
    "profile": {
        "name": "ソホラブ アフマディヤーン",
        "katakana": "アフマディヤーン ソホラブ",
        "title": "JSPS 外国人特別研究員 (PD)",
        "uni": "東京外国語大学 大学院総合国際学研究院",
        "email": "ahmadian@tufs.ac.jp",
        "address": "東京都府中市朝日町3-11-1",
        "languages": "英語, 日本語, ペルシア語, クルド語",
        "technical": "質的研究手法, SPSS, R, MS Office, Photoshop",
        "web": "https://researchmap.jp/sohrab.ahmadian",
        "photo": ""
    },
    "sec-edu": [
        { "date": "2018.04 - 2024.03", "title": "筑波大学 博士（国際日本研究）", "desc": "『在日クルド人のディアスポラ体験に関する質的研究』" }
    ],
    "sec-work": [
        { "date": "2025.04 - 現在", "title": "東京外国語大学 JSPS外国人特別研究員", "desc": "東京外国語大学" }
    ],
    "sec-projects": [],
    "sec-papers": [],
    "sec-books": [],
    "sec-talks": [],
    "sec-misc": []
};

// --- END DATA DASHBOARD ---

function makeLinksClickable(text) {
    if (!text) return "";
    const urlPattern = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlPattern, url => `<a href="${url}" target="_blank" style="color:var(--accent); text-decoration:none;">${url}</a>`);
}

function switchLang(lang) {
    const btnEn = document.getElementById('btn-en');
    const btnJp = document.getElementById('btn-jp');
    if (btnEn) btnEn.classList.remove('active');
    if (btnJp) btnJp.classList.remove('active');
    const activeBtn = document.getElementById('btn-' + lang);
    if (activeBtn) activeBtn.classList.add('active');

    const data = (lang === 'en') ? cvDataEn : cvDataJp;
    const p = data.profile;
    const labels = (lang === 'en') ? 
        ["Education", "Appointments", "Research Projects", "Publications", "Books", "Presentations", "Awards"] : 
        ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献"];

    const displayPhoto = p.photo || "https://researchmap.jp/sohrab.ahmadian/avatar.jpg";

    let html = `<header><div class="header-text"><h1>${p.name}</h1>
        ${p.katakana ? `<span class="katakana-name">${p.katakana}</span>` : ''}
        <p><strong>${p.title}</strong></p><p>${p.uni}</p>
        <p style="font-size:13px; color:#555; margin-top:5px;">${p.email} | ${p.address}</p>
        <p style="font-size:12px;">${makeLinksClickable(p.web)}</p></div>
        <div class="photo"><img src="${displayPhoto}"></div></header>`;

    const keys = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];
    keys.forEach((key, idx) => {
        if(data[key] && data[key].length > 0) {
            html += `<h2>${labels[idx]}</h2>`;
            data[key].forEach(item => {
                const badge = item.lang ? `<span class="lang-badge">[${item.lang}]</span>` : '';
                html += `<div class="entry"><div class="entry-date">${item.date}</div><div><span class="entry-title">${item.title} ${badge}</span><span class="entry-desc">${makeLinksClickable(item.desc)}</span></div></div>`;
            });
        }
    });

    html += `<h2>${lang==='en'?'Skills':'スキル'}</h2><div class="skills-grid">
        <div style="font-weight:bold">${lang==='en'?'Languages':'言語能力'}</div><div>${p.languages}</div>
        <div style="font-weight:bold">${lang==='en'?'Technical':'技能'}</div><div>${p.technical}</div></div>`;

    document.getElementById('cv-content').innerHTML = html;
}
window.onload = () => switchLang('en');
</script>
</body>
</html>
