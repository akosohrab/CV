<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab AHMADIAN, Ph.D. | Academic CV</title>
    
    <script src="data.js"></script>
    <script src="data-jp.js"></script>

    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #fdfdfd; }
        body { font-family: "Times New Roman", "Hiragino Mincho ProN", serif; margin: 0; background: var(--bg); }
        .toolbar { background: var(--primary); padding: 12px; position: sticky; top: 0; display: flex; justify-content: center; gap: 15px; z-index: 1000; }
        .btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn.active { background: var(--accent); border-color: var(--accent); }
        .cv-paper { max-width: 850px; margin: 30px auto; background: white; padding: 50px 70px; box-shadow: 0 0 30px rgba(0,0,0,0.05); min-height: 100vh; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .photo { width: 130px; height: 170px; border: 1px solid #ccc; overflow: hidden; }
        .photo img { width: 100%; height: auto; }
        h2 { border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; margin-top: 35px; font-size: 17px; padding-bottom: 3px; }
        .entry { display: grid; grid-template-columns: 150px 1fr; margin-bottom: 15px; }
        .entry-date { font-size: 13px; color: #666; }
        .entry-title { font-weight: bold; display: block; font-size: 15px; }
        @media print { .toolbar { display: none; } .cv-paper { box-shadow: none; padding: 0; } }
        @media (max-width: 768px) { .cv-paper { padding: 30px; } header { flex-direction: column-reverse; align-items: center; text-align: center; } .entry { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" id="btn-en" onclick="switchLang('en')">English</button>
    <button class="btn" id="btn-jp" onclick="switchLang('jp')">日本語</button>
    <button class="btn" style="background:white; color:black;" onclick="window.print()">Print PDF</button>
</div>

<div class="cv-paper" id="cv-content">
    <p style="text-align:center; padding:50px;">Initializing System...</p>
</div>

<script>
    function switchLang(lang) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('btn-' + lang);
        if(btn) btn.classList.add('active');

        // Check if variables exist
        let data;
        if (lang === 'en') data = window.cvDataEn;
        else data = window.cvDataJp;

        if (!data) {
            document.getElementById('cv-content').innerHTML = `
                <div style="color:red; text-align:center; padding:50px;">
                    <h3>Error: Data not loaded</h3>
                    <p>Please ensure <b>data.js</b> and <b>data-jp.js</b> are in your GitHub folder and start with <b>cvDataEn</b> and <b>cvDataJp</b>.</p>
                </div>`;
            return;
        }

        const labels = (lang === 'en') ? 
            ["Education", "Appointments", "Grants", "Publications", "Books", "Presentations", "Awards", "Memberships", "Languages", "Technical"] :
            ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献", "所属学協会", "言語能力", "スキル・IT"];

        const sections = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];

        let html = `
            <header>
                <div>
                    <h1 style="margin:0; font-size:28px;">Sohrab AHMADIAN, Ph.D.</h1>
                    <p><strong>JSPS Postdoctoral Fellow</strong></p>
                    <p>Tokyo University of Foreign Studies</p>
                    <p style="font-size:14px; margin-top:10px;">Email: ako.sohrab@gmail.com | researchmap.jp/sohrab.ahmadian</p>
                </div>
                <div class="photo"><img src="https://researchmap.jp/sohrab.ahmadian/avatar.jpg"></div>
            </header>
        `;

        sections.forEach((id, i) => {
            if(data[id]) {
                html += `<h2>${labels[i]}</h2>`;
                data[id].forEach(item => {
                    html += `<div class="entry"><div class="entry-date">${item.date}</div><div><span class="entry-title">${item.title}</span><span style="font-size:14px;">${item.desc}</span></div></div>`;
                });
            }
        });

        html += `<h2>${labels[7]}</h2><ul style="font-size:14px; line-height:1.8;">`;
        data.societies.forEach(s => html += `<li>${s}</li>`);
        html += `</ul><div style="display:grid; grid-template-columns:150px 1fr; gap:10px; font-size:14px; margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
            <div style="font-weight:bold">${labels[8]}</div><div>${data.skills.languages}</div>
            <div style="font-weight:bold">${labels[9]}</div><div>${data.skills.technical}</div>
        </div>`;

        document.getElementById('cv-content').innerHTML = html;
    }

    // Initialize after a tiny delay to ensure scripts are parsed
    window.onload = () => setTimeout(() => switchLang('jp'), 200);
</script>
</body>
</html>
