function makeLinks(text) {
    if (!text) return "";
    const urlPattern = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlPattern, url => `<a href="${url}" target="_blank" style="color:var(--accent); text-decoration:none;">${url}</a>`);
}

function switchLang(lang) {
    const d = cvData[lang];
    const p = d.profile;
    const img = p.photo || "https://researchmap.jp/sohrab.ahmadian/avatar.jpg";
    
    let html = `<header><div class="header-text"><h1>${p.name}</h1>
        ${p.katakana ? `<span class="katakana-name">${p.katakana}</span>` : ''}
        <p><strong>${p.title}</strong></p><p>${p.uni}</p>
        <p style="font-size:13px; color:#555; margin-top:5px;">${p.email} | ${p.address}</p>
        <p style="font-size:12px;">${makeLinks(p.web)}</p></div>
        <div class="photo"><img src="${img}"></div></header>`;
    
    const categories = Object.keys(d).filter(k => k !== 'profile');
    categories.forEach(key => {
        if (d[key] && d[key].length > 0) {
            const displayTitle = key.replace(/_/g, ' ').toUpperCase();
            html += `<h2>${displayTitle}</h2>`;
            d[key].forEach(item => {
                html += `<div class="entry"><div class="entry-date">${item.date}</div><div><div class="entry-title">${item.title}</div><div class="entry-desc">${makeLinks(item.desc)}</div></div></div>`;
            });
        }
    });
    
    html += `<h2>Technical Skills</h2><div style="font-size:14px; margin-top:10px;">${p.technical}</div>`;
    document.getElementById('cv-content').innerHTML = html;
}
