        .cv-paper { max-width: 850px; margin: 30px auto; background: white; padding: 60px 80px; box-shadow: 0 0 30px rgba(0,0,0,0.05); min-height: 100vh; }

        h2 { border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; margin-top: 35px; font-size: 16px; padding-bottom: 3px; letter-spacing: 1px; }
        .entry { display: grid; grid-template-columns: 150px 1fr; margin-bottom: 15px; }
        .entry-date { font-size: 13px; color: #666; font-family: Arial, sans-serif; }
        .entry-title { font-weight: bold; font-size: 15px; }
        .lang-badge { font-size: 10px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 3px; margin-left: 8px; vertical-align: middle; font-weight: normal; }
        .entry-desc { font-size: 14px; color: #333; display: block; margin-top: 2px; }
        .skills-grid { display: grid; grid-template-columns: 120px 1fr; gap: 10px; font-size: 14px; margin-top: 20px; }
        footer { margin-top: 50px; text-align: center; font-size: 11px; color: #bbb; border-top: 1px solid #eee; padding-top: 20px; }
        @media print { .toolbar { display: none; } .cv-paper { box-shadow: none; padding: 0; margin: 0; width: 100%; } }

function switchLang(lang) {
    const btnEn = document.getElementById('btn-en');
    const btnJp = document.getElementById('btn-jp');
    if (btnEn) btnEn.classList.remove('active');
    if (btnJp) btnJp.classList.remove('active');
    const activeBtn = document.getElementById('btn-' + lang);
    if (activeBtn) activeBtn.classList.add('active');

    const data = (lang === 'en') ? cvDataEn : cvDataJp;
    const p = data.profile;
    const labels = (lang === 'en') ? 
        ["Education", "Appointments", "Research Projects", "Publications", "Books", "Presentations", "Awards"] : 
        ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献"];

    let html = `<header><div class="header-text"><h1>${p.name}</h1><p><strong>${p.title}</strong></p><p>${p.uni}</p>
        <p style="font-size:13px; color:#555; margin-top:5px;">${p.email} | ${p.address}</p>
        <p style="font-size:12px; color:var(--accent);">${p.web}</p></div>
        <div class="photo"><img src="https://researchmap.jp/sohrab.ahmadian/avatar.jpg"></div></header>`;

    const keys = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];
    keys.forEach((key, idx) => {
        if(data[key] && data[key].length > 0) {
            html += `<h2>${labels[idx]}</h2>`;
            data[key].forEach(item => {
                const badge = item.lang ? `<span class="lang-badge">[${item.lang}]</span>` : '';
                html += `<div class="entry"><div class="entry-date">${item.date}</div><div><span class="entry-title">${item.title} ${badge}</span><span class="entry-desc">${item.desc}</span></div></div>`;
            });
        }
    });

    html += `<h2>${lang==='en'?'Skills':'スキル'}</h2><div class="skills-grid">
        <div style="font-weight:bold">${lang==='en'?'Languages':'言語能力'}</div><div>${p.languages}</div>
        <div style="font-weight:bold">${lang==='en'?'Technical':'技能'}</div><div>${p.technical}</div></div>`;

    document.getElementById('cv-content').innerHTML = html;
}
