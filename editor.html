<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sohrab's CV Editor</title>
    <style>
        :root { --primary: #1a2a3a; --bg: #f0f2f5; --accent: #27ae60; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #1a2a3a; color: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .entry-row { border-bottom: 1px solid #ddd; padding: 10px 0; display: grid; grid-template-columns: 120px 1fr 1fr 100px; gap: 10px; }
        .btn-save { background: var(--accent); color: white; width: 100%; padding: 15px; border: none; cursor: pointer; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <input type="password" id="token" placeholder="GitHub Token" style="margin-bottom: 10px;">
    <button onclick="fetchFile()">1. Load Records</button>
    
    <div id="editor-ui" style="display:none;">
        <div class="profile-grid" id="profile-container"></div>
        <div id="records-container"></div>
        <button class="btn-save" onclick="saveFile()">2. Push Changes Live</button>
    </div>
</div>

<script>
    const OWNER = "akosohrab", REPO = "CV", FILE_PATH = "index.html";
    let fileSha = "", fullFileContent = "", cvData = { en: {}, jp: {} }, currentLang = 'en';

    async function fetchFile() {
        const t = document.getElementById('token').value;
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${t}` }
            });
            const d = await res.json();
            fileSha = d.sha;
            fullFileContent = decodeURIComponent(escape(atob(d.content)));
            
            // FUZZY SEARCH (Ignores squashed lines)
            const enStr = fullFileContent.split('const cvDataEn = ')[1].split('};')[0] + '}';
            const jpStr = fullFileContent.split('const cvDataJp = ')[1].split('};')[0] + '}';
            
            cvData.en = JSON.parse(enStr);
            cvData.jp = JSON.parse(jpStr);
            
            render();
            document.getElementById('editor-ui').style.display = 'block';
            alert("Connected!");
        } catch (e) { alert("Error: Make sure index.html was updated first!"); }
    }

    function render() {
        const p = cvData[currentLang].profile;
        document.getElementById('profile-container').innerHTML = `
            <div>Name<input value="${p.name}" onchange="cvData['${currentLang}'].profile.name=this.value"></div>
            <div>Title<input value="${p.title}" onchange="cvData['${currentLang}'].profile.title=this.value"></div>
            <div>Uni<input value="${p.uni}" onchange="cvData['${currentLang}'].profile.uni=this.value"></div>
            <div>Email<input value="${p.email}" onchange="cvData['${currentLang}'].profile.email=this.value"></div>
        `;
        
        let html = '';
        ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"].forEach(key => {
            html += `<h3>${key}</h3>`;
            cvData[currentLang][key].forEach((item, i) => {
                html += `<div class="entry-row">
                    <input value="${item.date}" onchange="cvData['${currentLang}']['${key}'][${i}].date=this.value">
                    <input value="${item.title}" onchange="cvData['${currentLang}']['${key}'][${i}].title=this.value">
                    <textarea onchange="cvData['${currentLang}']['${key}'][${i}].desc=this.value">${item.desc}</textarea>
                </div>`;
            });
        });
        document.getElementById('records-container').innerHTML = html;
    }

    async function saveFile() {
        const t = document.getElementById('token').value;
        let content = fullFileContent.replace(/const cvDataEn = [\s\S]*?;/, `const cvDataEn = ${JSON.stringify(cvData.en, null, 4)};`);
        content = content.replace(/const cvDataJp = [\s\S]*?;/, `const cvDataJp = ${JSON.stringify(cvData.jp, null, 4)};`);
        
        await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Fuzzy Marker Sync",
                content: btoa(unescape(encodeURIComponent(content))),
                sha: fileSha
            })
        });
        alert("Success!");
    }
</script>
</body>
</html>
