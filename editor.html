<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sohrab's CV Editor Pro</title>
    <style>
        :root { --primary: #1a2a3a; --bg: #f0f2f5; --accent: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .profile-header { background: #1a2a3a; color: white; padding: 25px; border-radius: 8px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .profile-header label { font-size: 11px; text-transform: uppercase; color: #bdc3c7; margin-bottom: 5px; font-weight: bold; }
        .profile-header input, .profile-header textarea { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 4px; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 12px 30px; cursor: pointer; border-radius: 5px; background: #ddd; font-weight: bold; }
        .tab.active { background: var(--accent); color: white; }
        .section-box { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 25px; overflow: hidden; }
        .section-header { background: #f8f9fa; padding: 15px 20px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .entry-row { display: grid; grid-template-columns: 120px 2fr 3fr 110px 80px; gap: 15px; padding: 15px 20px; border-bottom: 1px solid #eee; align-items: start; }
        textarea { resize: vertical; min-height: 45px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 100%; font-family: inherit; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 100%; }
        .move-btns { display: flex; flex-direction: column; gap: 2px; }
        .action-btn { background: #f8f9fa; border: 1px solid #ddd; cursor: pointer; font-size: 14px; padding: 2px 8px; border-radius: 4px; }
        .btn-save { background: var(--accent); color: white; width: 100%; padding: 20px; font-size: 18px; margin-top: 30px; border: none; border-radius: 8px; cursor: pointer; }
        #status { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; display: none; color: white; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-bar">
        <div id="tab-en" class="tab active" onclick="switchTab('en')">English Editor</div>
        <div id="tab-jp" class="tab" onclick="switchTab('jp')">日本語エディタ</div>
    </div>

    <div class="setup-bar" style="margin-bottom:20px; display:flex; gap:10px;">
        <input type="password" id="token" style="flex-grow:1; padding:10px;" placeholder="GitHub Token">
        <button onclick="fetchFile()" style="padding:10px 20px; cursor:pointer;">Load Records</button>
    </div>

    <div id="editor-ui" style="display:none;">
        <div id="profile-container" class="profile-header"></div>
        <div id="records-container"></div>
        <button class="btn-save" onclick="saveFile()">2. Push Changes Live</button>
    </div>
</div>

<div id="status"></div>

<script>
    const OWNER = "akosohrab";
    const REPO = "CV";
    const FILE_PATH = "index.html";
    let fileSha = "";
    let fullFileContent = "";
    let cvData = { en: {}, jp: {} };
    let currentLang = 'en';

    const keys = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];
    const sectionLabels = {
        en: ["Education", "Appointments", "Research Projects", "Publications", "Books", "Presentations", "Awards"],
        jp: ["学位・学歴", "職歴・研究歴", "研究課題", "研究業績：論文", "書籍・出版物", "講演・口頭発表", "受賞・社会貢献"]
    };

    async function fetchFile() {
        const t = document.getElementById('token').value;
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${t}` }
            });
            const d = await res.json();
            fileSha = d.sha;
            const bin = atob(d.content.replace(/\s/g, ''));
            fullFileContent = new TextDecoder().decode(Uint8Array.from(bin, m => m.charCodeAt(0)));
            cvData.en = JSON.parse(fullFileContent.match(/const cvDataEn = ([\s\S]*?);/)[1]);
            cvData.jp = JSON.parse(fullFileContent.match(/const cvDataJp = ([\s\S]*?);/)[1]);
            renderAll();
            document.getElementById('editor-ui').style.display = 'block';
            notify("Data Loaded!", "#27ae60");
        } catch (e) { notify("Marker Error: Replace index.html first", "#e74c3c"); }
    }

    function renderAll() {
        const p = cvData[currentLang].profile;
        document.getElementById('profile-container').innerHTML = `
            <div><label>Name</label><input value="${p.name}" onchange="updateProfile('name',this.value)"></div>
            <div><label>Academic Title</label><input value="${p.title}" onchange="updateProfile('title',this.value)"></div>
            <div><label>Affiliation</label><input value="${p.uni}" onchange="updateProfile('uni',this.value)"></div>
            <div><label>Katakana Name (JP Only)</label><input value="${p.katakana || ''}" onchange="updateProfile('katakana',this.value)"></div>
            <div><label>Email</label><input value="${p.email}" onchange="updateProfile('email',this.value)"></div>
            <div><label>ResearchMap URL</label><input value="${p.web}" onchange="updateProfile('web',this.value)"></div>
            <div style="grid-column: span 3;"><label>Language Proficiency Levels</label><input value="${p.languages}" onchange="updateProfile('languages',this.value)"></div>
            <div style="grid-column: span 3;"><label>Technical Skills</label><textarea onchange="updateProfile('technical',this.value)">${p.technical}</textarea></div>
        `;

        const container = document.getElementById('records-container');
        container.innerHTML = '';
        keys.forEach((key, idx) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section-box';
            let rows = cvData[currentLang][key].map((item, i) => `
                <div class="entry-row">
                    <input value="${item.date || ''}" onchange="updateEntry('${key}',${i},'date',this.value)">
                    <textarea onchange="updateEntry('${key}',${i},'title',this.value)">${item.title || ''}</textarea>
                    <textarea onchange="updateEntry('${key}',${i},'desc',this.value)">${item.desc || ''}</textarea>
                    <select onchange="updateEntry('${key}',${i},'lang',this.value)">
                        <option value="">No Label</option>
                        <option value="English" ${item.lang==='English'?'selected':''}>English</option>
                        <option value="Japanese" ${item.lang==='Japanese'?'selected':''}>Japanese</option>
                        <option value="Persian" ${item.lang==='Persian'?'selected':''}>Persian</option>
                    </select>
                    <div class="move-btns">
                        <button class="action-btn" onclick="moveItem('${key}',${i},-1)">↑</button>
                        <button class="action-btn" onclick="moveItem('${key}',${i},1)">↓</button>
                        <button class="action-btn del-btn" style="color:#e74c3c; border-color:#e74c3c" onclick="deleteItem('${key}',${i})">✕</button>
                    </div>
                </div>
            `).join('');
            sectionDiv.innerHTML = `<div class="section-header"><span>${sectionLabels[currentLang][idx]}</span><button onclick="addItem('${key}')">+ Add</button></div>${rows}`;
            container.appendChild(sectionDiv);
        });
    }

    function updateProfile(f, v) { cvData[currentLang].profile[f] = v; }
    function updateEntry(k, i, f, v) { cvData[currentLang][k][i][f] = v; }
    function addItem(key) { cvData[currentLang][key].unshift({ date: "2026", title: "Title", desc: "Details", lang: "" }); renderAll(); }
    function deleteItem(key, index) { if(confirm("Delete entry?")) { cvData[currentLang][key].splice(index, 1); renderAll(); } }
    function moveItem(k, i, d) { const a = cvData[currentLang][k]; const n = i + d; if (n >= 0 && n < a.length) { [a[i], a[n]] = [a[n], a[i]]; renderAll(); } }
    function switchTab(l) { currentLang = l; document.getElementById('tab-en').className = l==='en'?'tab active':'tab'; document.getElementById('tab-jp').className = l==='jp'?'tab active':'tab'; renderAll(); }

    async function saveFile() {
        const t = document.getElementById('token').value;
        notify("Saving...", "#f39c12");
        let content = fullFileContent.replace(/const cvDataEn = [\s\S]*?;/, `const cvDataEn = ${JSON.stringify(cvData.en, null, 4)};`);
        content = content.replace(/const cvDataJp = [\s\S]*?;/, `const cvDataJp = ${JSON.stringify(cvData.jp, null, 4)};`);
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Dashboard Standardized Sync", content: btoa(unescape(encodeURIComponent(content))), sha: fileSha })
            });
            if (res.ok) notify("Success! Live in 60s.", "#27ae60");
            else notify("Error Saving", "#e74c3c");
        } catch (e) { notify("Network Error", "#e74c3c"); }
    }

    function notify(m, c) {
        const s = document.getElementById('status');
        s.innerText = m; s.style.background = c; s.style.display = "block";
        setTimeout(() => s.style.display = "none", 4000);
    }
</script>
</body>
</html>
