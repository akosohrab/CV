<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sohrab's CV Manager</title>
    <style>
        :root { --primary: #1a2a3a; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .setup-bar { background: #eee; padding: 15px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="password"] { flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 30px; cursor: pointer; border-radius: 5px; background: #ddd; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; }
        .profile-card { background: #f8f9fa; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .profile-card label { display: block; font-size: 11px; font-weight: bold; color: #666; }
        .profile-card input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .section-box { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 25px; }
        .section-header { background: #f1f1f1; padding: 10px 20px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .entry-row { display: grid; grid-template-columns: 120px 2fr 3fr 120px; gap: 10px; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin-top: 30px; }
        #status { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 8px; display: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>CV Content Manager</h1>
    <div class="setup-bar">
        <input type="password" id="token" placeholder="GitHub Token (ghp_...)">
        <button onclick="fetchFile()" style="padding:10px 20px; cursor:pointer; font-weight:bold;">1. Load Records</button>
    </div>

    <div id="editor-ui" style="display:none;">
        <div class="tab-bar">
            <div id="tab-en" class="tab active" onclick="switchTab('en')">English Editor</div>
            <div id="tab-jp" class="tab" onclick="switchTab('jp')">日本語エディタ</div>
        </div>

        <h3>Profile Information & Skills</h3>
        <div id="profile-form" class="profile-card"></div>

        <h3>Academic Records</h3>
        <div id="form-container"></div>
        
        <button class="btn-save" onclick="saveFile()">2. Push Changes Live</button>
    </div>
</div>

<div id="status"></div>

<script>
    const OWNER = "akosohrab";
    const REPO = "CV";
    const FILE_PATH = "index.html";
    let fileSha = "";
    let fullFileContent = "";
    let cvData = { en: {}, jp: {} };
    let currentLang = 'en';

    async function fetchFile() {
        const t = document.getElementById('token').value;
        notify("Loading data...", "#3498db");
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${t}` }
            });
            const d = await res.json();
            fileSha = d.sha;
            const bin = atob(d.content.replace(/\s/g, ''));
            fullFileContent = new TextDecoder().decode(Uint8Array.from(bin, m => m.charCodeAt(0)));
            
            cvData.en = JSON.parse(fullFileContent.match(/const cvDataEn = ([\s\S]*?);/)[1]);
            cvData.jp = JSON.parse(fullFileContent.match(/const cvDataJp = ([\s\S]*?);/)[1]);
            
            renderAll();
            document.getElementById('editor-ui').style.display = 'block';
            notify("Data Ready!", "#27ae60");
        } catch (e) { notify("Error: Check Markers or Token", "#e74c3c"); }
    }

    function renderAll() {
        const p = cvData[currentLang].profile;
        document.getElementById('profile-form').innerHTML = `
            <div><label>Name</label><input value="${p.name}" onchange="updateProfile('name', this.value)"></div>
            <div><label>Title</label><input value="${p.title}" onchange="updateProfile('title', this.value)"></div>
            <div><label>University</label><input value="${p.uni}" onchange="updateProfile('uni', this.value)"></div>
            <div><label>Address</label><input value="${p.address}" onchange="updateProfile('address', this.value)"></div>
            <div style="grid-column: span 2;"><label>Languages Proficiency</label><input value="${p.languages}" onchange="updateProfile('languages', this.value)"></div>
            <div style="grid-column: span 2;"><label>Technical Skills</label><input value="${p.technical}" onchange="updateProfile('technical', this.value)"></div>
        `;

        const container = document.getElementById('form-container');
        container.innerHTML = '';
        const keys = ["sec-edu", "sec-work", "sec-projects", "sec-papers", "sec-books", "sec-talks", "sec-misc"];
        const labels = currentLang==='en'?["Education","Work","Grants","Papers","Books","Talks","Awards"]:["学歴","職歴","研究","論文","著書","発表","受賞"];
        const langs = ["English", "Japanese", "Persian", "Kurdish", "Arabic", "Turkish"];

        keys.forEach((key, idx) => {
            const div = document.createElement('div');
            div.className = 'section-box';
            let rows = cvData[currentLang][key].map((item, i) => `
                <div class="entry-row">
                    <input value="${item.date}" onchange="updateEntry('${key}',${i},'date',this.value)">
                    <input value="${item.title}" onchange="updateEntry('${key}',${i},'title',this.value)">
                    <input value="${item.desc}" onchange="updateEntry('${key}',${i},'desc',this.value)">
                    <select onchange="updateEntry('${key}',${i},'lang',this.value)">
                        <option value="">No Lang</option>
                        ${langs.map(l => `<option value="${l}" ${item.lang===l?'selected':''}>${l}</option>`).join('')}
                    </select>
                </div>
            `).join('');
            div.innerHTML = `<div class="section-header">${labels[idx]}</div>${rows}`;
            container.appendChild(div);
        });
    }

    function updateProfile(f, v) { cvData[currentLang].profile[f] = v; }
    function updateEntry(k, i, f, v) { cvData[currentLang][k][i][f] = v; }
    function switchTab(l) { 
        currentLang = l; 
        document.getElementById('tab-en').className = l==='en'?'tab active':'tab';
        document.getElementById('tab-jp').className = l==='jp'?'tab active':'tab';
        renderAll(); 
    }

    async function saveFile() {
        const t = document.getElementById('token').value;
        let content = fullFileContent.replace(/const cvDataEn = [\s\S]*?;/, `const cvDataEn = ${JSON.stringify(cvData.en, null, 4)};`);
        content = content.replace(/const cvDataJp = [\s\S]*?;/, `const cvDataJp = ${JSON.stringify(cvData.jp, null, 4)};`);
        try {
            const b = new TextEncoder().encode(content);
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "CV Update: Records & Languages", content: btoa(String.fromCharCode(...b)), sha: fileSha })
            });
            if (res.ok) notify("Success! Live in 60s", "#27ae60");
        } catch (e) { notify("Error Saving", "#e74c3c"); }
    }

    function notify(m, c) {
        const s = document.getElementById('status');
        s.innerText = m; s.style.background = c; s.style.display = "block";
        setTimeout(() => s.style.display = "none", 4000);
    }
</script>
</body>
</html>
