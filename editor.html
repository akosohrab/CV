<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab's CV Professional Editor</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .nav-bar { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 1100px; margin: 30px auto; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .entry-card { background: #f9f9f9; border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; position: relative; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--accent); color: white; width: 100%; font-size: 18px; margin-top: 30px; }
        .btn-add-cat { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; }
        #status { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: bold; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div style="font-size: 18px; font-weight: bold;">CV MANAGER PRO v4.0</div>
    <div style="display: flex; gap: 10px;">
        <select id="lang-switch" onchange="switchLang(this.value)" style="width: auto; background: rgba(255,255,255,0.1); color: white;">
            <option value="en" style="color: black;">English Data</option>
            <option value="jp" style="color: black;">Japanese Data</option>
        </select>
        <input type="password" id="gh-token" placeholder="GitHub Token" style="width: 200px; margin: 0;">
        <button class="btn" style="background: white; color: var(--primary);" onclick="fetchCVData()">Load Records</button>
    </div>
</div>

<div class="container" id="main-editor" style="display: none;">
    <div class="card">
        <div class="section-header"><h3>Profile Information</h3></div>
        <div id="profile-container" class="profile-grid"></div>
    </div>

    <div style="text-align: right; margin-bottom: 20px;">
        <button class="btn btn-add-cat" onclick="addNewCategory()">+ Create New Section (Category)</button>
    </div>

    <div id="dynamic-sections"></div>

    <button class="btn btn-save" onclick="saveCVData()">PUSH ALL CHANGES TO GITHUB</button>
</div>

<div id="status"></div>

<script>
    const CONFIG = { owner: "akosohrab", repo: "CV", path: "index.html" };
    let fileSha = "", fullContent = "", cvData = {}, currentLang = 'en';

    async function fetchCVData() {
        const token = document.getElementById('gh-token').value;
        if(!token) return notify("Enter Token!", "#e74c3c");
        
        notify("Connecting...", "#f39c12");
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const d = await res.json();
            fileSha = d.sha;
            fullContent = decodeURIComponent(escape(atob(d.content)));
            
            // Robust Marker Identification
            const rawData = fullContent.split('/* DATA_START */')[1].split('/* DATA_END */')[0];
            cvData = JSON.parse(rawData.replace('const cvData = ', '').trim().replace(/;$/, ''));
            
            document.getElementById('main-editor').style.display = 'block';
            renderAll();
            notify("Data Synced!", "#27ae60");
        } catch (e) {
            notify("Marker Pattern Error!", "#e74c3c");
            console.error(e);
        }
    }

    function renderAll() {
        const p = cvData[currentLang].profile;
        // 1. Render Profile
        document.getElementById('profile-container').innerHTML = `
            <div><label>Name</label><input value="${p.name}" onchange="cvData['${currentLang}'].profile.name=this.value"></div>
            <div><label>Academic Title</label><input value="${p.title}" onchange="cvData['${currentLang}'].profile.title=this.value"></div>
            <div><label>Institution</label><input value="${p.uni}" onchange="cvData['${currentLang}'].profile.uni=this.value"></div>
            <div><label>Email</label><input value="${p.email}" onchange="cvData['${currentLang}'].profile.email=this.value"></div>
            <div><label>Web/ResearchMap</label><input value="${p.web}" onchange="cvData['${currentLang}'].profile.web=this.value"></div>
            <div><label>Address</label><input value="${p.address}" onchange="cvData['${currentLang}'].profile.address=this.value"></div>
            <div style="grid-column: span 3;"><label>Skills & Languages</label>
            <textarea onchange="cvData['${currentLang}'].profile.technical=this.value">${p.technical}</textarea></div>
        `;

        // 2. Render Dynamic Sections
        const list = document.getElementById('dynamic-sections');
        list.innerHTML = '';
        
        // Find all categories except profile
        const categories = Object.keys(cvData[currentLang]).filter(k => k !== 'profile');
        
        categories.forEach(cat => {
            let sectionHTML = `
                <div class="card">
                    <div class="section-header">
                        <h3 style="text-transform: uppercase;">${cat}</h3>
                        <button class="btn btn-add-cat" onclick="addEntry('${cat}')">+ Add Item</button>
                    </div>
                    <div id="items-${cat}">`;
            
            cvData[currentLang][cat].forEach((item, i) => {
                sectionHTML += `
                    <div class="entry-card">
                        <button class="btn btn-delete" style="float:right" onclick="deleteEntry('${cat}',${i})">X</button>
                        <div style="display:grid; grid-template-columns: 150px 1fr; gap:15px;">
                            <div><label>Date</label><input value="${item.date}" onchange="cvData['${currentLang}']['${cat}'][${i}].date=this.value"></div>
                            <div><label>Title</label><input value="${item.title}" onchange="cvData['${currentLang}']['${cat}'][${i}].title=this.value"></div>
                            <div style="grid-column: span 2;"><label>Description</label>
                            <textarea onchange="cvData['${currentLang}']['${cat}'][${i}].desc=this.value">${item.desc}</textarea></div>
                        </div>
                    </div>`;
            });
            sectionHTML += `</div></div>`;
            list.innerHTML += sectionHTML;
        });
    }

    function addNewCategory() {
        const name = prompt("Enter category name in English (e.g. awards, grants, teaching):");
        if (name && !cvData.en[name]) {
            cvData.en[name] = [];
            cvData.jp[name] = [];
            renderAll();
            notify("New Category Added!", "#3498db");
        }
    }

    function addEntry(cat) { cvData[currentLang][cat].unshift({date:"2026", title:"New Entry", desc:""}); renderAll(); }
    function deleteEntry(cat, i) { if(confirm("Delete this entry?")) { cvData[currentLang][cat].splice(i,1); renderAll(); } }
    function switchLang(l) { currentLang = l; renderAll(); }

    async function saveCVData() {
        const token = document.getElementById('gh-token').value;
        notify("Pushing to GitHub...", "#f39c12");
        
        const newDataBlock = `/* DATA_START */\nconst cvData = ${JSON.stringify(cvData, null, 2)};\n/* DATA_END */`;
        const finalContent = fullContent.replace(/\/\* DATA_START \*\/[\s\S]*?\/\* DATA_END \*\//, newDataBlock);

        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "CV Update: Dynamic Category Sync",
                    content: btoa(unescape(encodeURIComponent(finalContent))),
                    sha: fileSha
                })
            });
            if(res.ok) {
                const updated = await res.json();
                fileSha = updated.content.sha;
                notify("Success! Live in 60s.", "#27ae60");
            } else { throw new Error(); }
        } catch (e) { notify("Save Failed!", "#e74c3c"); }
    }

    function notify(m, c) {
        const s = document.getElementById('status');
        s.innerText = m; s.style.background = c; s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 4000);
    }
</script>
</body>
</html>
